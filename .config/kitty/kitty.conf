# vim:fileencoding=utf-8:foldmethod=marker

# 字体
font_family CaskaydiaCoveNerdFont

# 禁用响铃
enable_audio_bell no

# 模糊
background_opacity 0.9
background_blur 7

# Neovide 风格拖尾
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
