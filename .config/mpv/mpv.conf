# 配置来源：https://github.com/hooke007/MPV_lazy/blob/main/portable_config/mpv.conf
# 参考文档：https://hooke007.github.io/official_man/mpv.html
input-conf = "~~/input.conf"                    # 自定义快捷键方案

# 基础
hwdec = auto                                    # 硬件视频解码API

# 功能
## 一般功能
idle = yes                                      # 是否空闲待机（中止播放或所有文件播放后依旧保持mpv运行）
input-builtin-bindings = no                     # 是否使用mpv初始的快捷键（禁用则只使用input-conf中的设定）
save-position-on-quit = yes                     # 退出时记住播放状态
watch-later-options = start,aid,vid,sid         # 稍后观看的属性白名单

## 官方外部脚本autoload.lua的平替功能
autocreate-playlist = same                      # 自动填充播放列表，same填充同类文件
directory-mode = ignore                         # 忽略子目录中的文件添加到播放列表

## 窗口相关
keep-open = yes                                 # 播完列表暂停
autofit-smaller = 50%x50%                       # 窗口自动拉伸时（初启动/切换文件）防止太小
autofit-larger = 80%x80%                        # 窗口自动拉伸时（初启动/切换文件）防止太大

# OSD
osd-playing-msg = "${filename}"                 # 每个文件开始播放时短暂显示的信息
osd-status-msg = "${estimated-frame-number} / ${estimated-frame-count} (${percent-pos}%)"
                                                # 播放过程中显示的自定义字符串，当前字符串含义是"帧索引/总帧数(进度%)"
osd-level = 3                                   # 指定OSD以何种模式启动

# 音频
audio-file-auto = fuzzy                         # 自动加载同名外挂音轨（fuzzy为模糊名）

# 字幕
sub-auto = fuzzy                                # 自动加载当前播放文件的同名外挂字幕（fuzzy为模糊名）

# 截图
screenshot-template = "~~desktop/%F-%p"         # 截图命名模板
